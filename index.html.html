<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicles of the Wanderer — Open World RPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Crimson Text', serif; }
  canvas { display: block; }

  /* Loading Screen */
  #loading-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(135deg, #0a0a12, #1a0a2e, #0a1628);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 1s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  #loading-screen h1 {
    font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, #f4d03f, #e6a817, #f4d03f);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none; letter-spacing: 0.15em; margin-bottom: 0.5rem;
  }
  #loading-screen p { color: #8a7fb5; font-size: 1.1rem; font-style: italic; margin-bottom: 2rem; }
  .load-bar-outer {
    width: 320px; height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .load-bar-inner {
    height: 100%; width: 0%; background: linear-gradient(90deg, #f4d03f, #e6a817);
    border-radius: 3px; transition: width 0.3s;
  }
  #load-text { color: #665fa0; font-size: 0.85rem; margin-top: 0.8rem; font-family: 'JetBrains Mono', monospace; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100; pointer-events: none;
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start;
  }
  .hud-left, .hud-right, .hud-center { pointer-events: auto; }

  /* Health / Stamina / XP bars */
  .stat-bars { display: flex; flex-direction: column; gap: 6px; }
  .stat-row { display: flex; align-items: center; gap: 8px; }
  .stat-label {
    font-family: 'Cinzel', serif; font-size: 0.65rem; font-weight: 700;
    color: #c8b87a; letter-spacing: 0.12em; width: 28px; text-align: right;
  }
  .stat-bar-outer {
    width: 180px; height: 10px; background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .stat-bar-fill { height: 100%; transition: width 0.4s ease; border-radius: 1px; }
  .hp-fill { background: linear-gradient(90deg, #8b1a1a, #e63946, #ff6b6b); }
  .sp-fill { background: linear-gradient(90deg, #1a5c2e, #2ecc71, #6bffaa); }
  .xp-fill { background: linear-gradient(90deg, #5a3e8a, #9b59b6, #d4a5ff); }
  .stat-val {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: #aaa; min-width: 50px;
  }

  /* Level badge */
  .level-badge {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  }
  .level-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f4d03f, #a67c00);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-weight: 900; font-size: 1rem; color: #1a0a00;
    border: 2px solid #f4d03f; box-shadow: 0 0 12px rgba(244,208,63,0.4);
  }
  .level-text { font-family: 'Cinzel', serif; font-size: 0.7rem; color: #c8b87a; letter-spacing: 0.1em; }

  /* Minimap */
  .minimap-container {
    width: 160px; height: 160px; border-radius: 50%; overflow: hidden;
    border: 2px solid rgba(244,208,63,0.4); background: rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,0,0,0.3);
    position: relative;
  }
  #minimap-canvas { width: 100%; height: 100%; border-radius: 50%; }
  .minimap-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 8px; height: 8px; background: #f4d03f; border-radius: 50%;
    box-shadow: 0 0 6px #f4d03f; z-index: 2;
  }
  .minimap-label {
    text-align: center; margin-top: 6px;
    font-family: 'Cinzel', serif; font-size: 0.6rem; color: #8a7fb5; letter-spacing: 0.15em;
  }

  /* Quest panel */
  #quest-panel {
    position: fixed; top: 80px; right: 20px; z-index: 100;
    background: rgba(10,8,20,0.85); border: 1px solid rgba(244,208,63,0.2);
    border-radius: 4px; padding: 12px 16px; min-width: 220px; max-width: 260px;
    backdrop-filter: blur(8px);
  }
  #quest-panel h3 {
    font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 700;
    color: #f4d03f; letter-spacing: 0.15em; margin-bottom: 8px;
    border-bottom: 1px solid rgba(244,208,63,0.15); padding-bottom: 6px;
  }
  .quest-item { margin-bottom: 8px; }
  .quest-title { font-size: 0.8rem; color: #e0d5b8; font-weight: 600; }
  .quest-desc { font-size: 0.7rem; color: #8a8570; font-style: italic; margin-top: 2px; }
  .quest-progress {
    margin-top: 4px; height: 4px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .quest-progress-fill { height: 100%; background: #f4d03f; border-radius: 2px; transition: width 0.3s; }

  /* Dialog box */
  #dialog-box {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 200; width: 600px; max-width: 90vw;
    background: rgba(10,8,20,0.92); border: 1px solid rgba(244,208,63,0.3);
    border-radius: 6px; padding: 20px 24px; display: none;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #dialog-box.show { display: block; animation: dialogIn 0.3s ease; }
  @keyframes dialogIn { from { opacity:0; transform: translateX(-50%) translateY(20px); } }
  .dialog-speaker {
    font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 700;
    color: #f4d03f; letter-spacing: 0.12em; margin-bottom: 6px;
  }
  .dialog-text { font-size: 1rem; color: #d4ccb0; line-height: 1.6; }
  .dialog-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    color: #665fa0; margin-top: 10px; text-align: right;
  }

  /* Interaction prompt */
  #interact-prompt {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    z-index: 150; padding: 8px 20px;
    background: rgba(10,8,20,0.8); border: 1px solid rgba(244,208,63,0.3);
    border-radius: 20px; display: none;
    font-family: 'Cinzel', serif; font-size: 0.75rem; color: #f4d03f;
    letter-spacing: 0.1em;
    backdrop-filter: blur(8px); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 8px rgba(244,208,63,0.2); } 50% { box-shadow: 0 0 18px rgba(244,208,63,0.5); } }

  /* Bottom bar */
  #bottom-bar {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 6px;
  }
  .hotkey-slot {
    width: 44px; height: 44px;
    background: rgba(10,8,20,0.7); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
  }
  .hotkey-slot.active { border-color: #f4d03f; box-shadow: 0 0 10px rgba(244,208,63,0.3); }
  .hotkey-num {
    position: absolute; top: 2px; left: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; color: #665fa0;
  }
  .hotkey-icon { font-size: 1.2rem; }

  /* Damage numbers */
  .dmg-number {
    position: fixed; z-index: 300; pointer-events: none;
    font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.5rem;
    color: #ff4444; text-shadow: 0 0 8px rgba(255,0,0,0.5), 2px 2px 0 #000;
    animation: dmgFloat 1s ease-out forwards;
  }
  .dmg-number.heal { color: #2ecc71; text-shadow: 0 0 8px rgba(46,204,113,0.5), 2px 2px 0 #000; }
  @keyframes dmgFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.6); }
  }

  /* Notification */
  #notification {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 400; padding: 16px 32px;
    background: rgba(10,8,20,0.9); border: 1px solid #f4d03f;
    border-radius: 4px; display: none;
    font-family: 'Cinzel', serif; font-size: 1.1rem; color: #f4d03f;
    letter-spacing: 0.1em; text-align: center;
    box-shadow: 0 0 40px rgba(244,208,63,0.3);
    animation: notifIn 0.4s ease;
  }
  @keyframes notifIn { from { opacity:0; transform: translate(-50%,-50%) scale(0.8); } }

  /* Controls help */
  #controls-help {
    position: fixed; bottom: 70px; left: 20px; z-index: 100;
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    color: #554f80; line-height: 1.8;
  }
  #controls-help kbd {
    display: inline-block; padding: 1px 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px; color: #8a7fb5; font-size: 0.6rem; margin: 0 1px;
  }

  /* Enemy HP */
  .enemy-hp-bar {
    position: fixed; z-index: 150; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .enemy-name {
    font-family: 'Cinzel', serif; font-size: 0.6rem; color: #e63946;
    letter-spacing: 0.1em;
  }
  .enemy-hp-outer {
    width: 60px; height: 5px; background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .enemy-hp-fill { height: 100%; background: #e63946; transition: width 0.3s; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <h1>CHRONICLES</h1>
  <p>of the Wanderer</p>
  <div class="load-bar-outer"><div class="load-bar-inner" id="load-bar"></div></div>
  <div id="load-text">Initializing world...</div>
</div>

<!-- HUD -->
<div id="hud" style="display:none;">
  <div class="hud-left">
    <div class="level-badge">
      <div class="level-circle" id="level-num">1</div>
      <div class="level-text">WANDERER</div>
    </div>
    <div class="stat-bars">
      <div class="stat-row">
        <span class="stat-label">HP</span>
        <div class="stat-bar-outer"><div class="stat-bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div>
        <span class="stat-val" id="hp-text">100/100</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">SP</span>
        <div class="stat-bar-outer"><div class="stat-bar-fill sp-fill" id="sp-bar" style="width:100%"></div></div>
        <span class="stat-val" id="sp-text">100/100</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">XP</span>
        <div class="stat-bar-outer"><div class="stat-bar-fill xp-fill" id="xp-bar" style="width:0%"></div></div>
        <span class="stat-val" id="xp-text">0/100</span>
      </div>
    </div>
  </div>
  <div class="hud-right">
    <div class="minimap-container">
      <canvas id="minimap-canvas" width="160" height="160"></canvas>
      <div class="minimap-center"></div>
    </div>
    <div class="minimap-label">VERDANT PLAINS</div>
  </div>
</div>

<!-- Quest Panel -->
<div id="quest-panel" style="display:none;">
  <h3>⚔ ACTIVE QUESTS</h3>
  <div id="quest-list"></div>
</div>

<!-- Dialog Box -->
<div id="dialog-box">
  <div class="dialog-speaker" id="dialog-speaker"></div>
  <div class="dialog-text" id="dialog-text"></div>
  <div class="dialog-hint">Press [E] to continue</div>
</div>

<!-- Interact Prompt -->
<div id="interact-prompt">Press [E] to interact</div>

<!-- Bottom Hotbar -->
<div id="bottom-bar">
  <div class="hotkey-slot active"><span class="hotkey-num">1</span><span class="hotkey-icon">⚔</span></div>
  <div class="hotkey-slot"><span class="hotkey-num">2</span><span class="hotkey-icon">🛡</span></div>
  <div class="hotkey-slot"><span class="hotkey-num">3</span><span class="hotkey-icon">❤️</span></div>
  <div class="hotkey-slot"><span class="hotkey-num">4</span><span class="hotkey-icon">⚡</span></div>
  <div class="hotkey-slot"><span class="hotkey-num">5</span><span class="hotkey-icon">🔥</span></div>
</div>

<!-- Controls -->
<div id="controls-help">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
  <kbd>SHIFT</kbd> Sprint &nbsp;
  <kbd>SPACE</kbd> Jump<br>
  <kbd>MOUSE</kbd> Look &nbsp;
  <kbd>CLICK</kbd> Attack &nbsp;
  <kbd>E</kbd> Interact
</div>

<!-- Notification -->
<div id="notification" id="notification"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CHRONICLES OF THE WANDERER — Open World 3D RPG
// ============================================================

// GLTFLoader inline (r128 compatible)
(function(){
  const BINARY_EXT_HEADER_MAGIC = 'glTF';
  const EXTENSIONS = { KHR_BINARY_GLTF: 'KHR_binary_glTF', KHR_MATERIALS_UNLIT: 'KHR_materials_unlit' };
  const WEBGL_CONSTANTS = { FLOAT:5126, FLOAT_VEC2:35664, FLOAT_VEC3:35665, FLOAT_VEC4:35666, LINEAR:9729, REPEAT:10497, SAMPLER_2D:35678, UNSIGNED_BYTE:5121, UNSIGNED_SHORT:5123, TRIANGLES:4, LINES:1, UNSIGNED_INT:5125 };
  const WEBGL_TYPE_SIZES = { SCALAR:1, VEC2:2, VEC3:3, VEC4:4, MAT2:4, MAT3:9, MAT4:16 };
  const WEBGL_COMPONENT_TYPES = { 5120:Int8Array, 5121:Uint8Array, 5122:Int16Array, 5123:Uint16Array, 5125:Uint32Array, 5126:Float32Array };

  class GLTFLoader {
    constructor(manager) { this.manager = manager || THREE.DefaultLoadingManager; }
    load(url, onLoad, onProgress, onError) {
      const loader = new THREE.FileLoader(this.manager);
      loader.setResponseType('arraybuffer');
      loader.load(url, (data) => {
        try { this.parse(data, '', (gltf) => onLoad(gltf), onError); }
        catch(e) { if(onError) onError(e); else console.error(e); }
      }, onProgress, onError);
    }
    parse(data, path, onLoad, onError) {
      let content, body;
      const magic = new TextDecoder().decode(new Uint8Array(data, 0, 4));
      if (magic === BINARY_EXT_HEADER_MAGIC) {
        const view = new DataView(data);
        const version = view.getUint32(4, true);
        const jsonLen = view.getUint32(12, true);
        content = JSON.parse(new TextDecoder().decode(new Uint8Array(data, 20, jsonLen)));
        body = data.slice(20 + jsonLen + 8);
      } else {
        content = JSON.parse(new TextDecoder().decode(new Uint8Array(data)));
      }
      const parser = new GLTFParser(content, body, path);
      parser.parse(onLoad, onError);
    }
  }

  class GLTFParser {
    constructor(json, body, path) { this.json = json; this.body = body; this.path = path; }

    parse(onLoad, onError) {
      try {
        const result = { scene: new THREE.Group(), scenes: [], animations: [], cameras: [], asset: this.json.asset || {} };
        this.buildMaterials();
        const nodes = this.buildNodes();
        const skins = this.json.skins || [];

        // Build skeleton data
        const skeletons = [];
        for (const skin of skins) {
          const bones = skin.joints.map(j => nodes[j]);
          const boneInverses = [];
          if (skin.inverseBindMatrices !== undefined) {
            const acc = this.getAccessorData(skin.inverseBindMatrices);
            for (let i = 0; i < bones.length; i++) {
              const m = new THREE.Matrix4();
              m.fromArray(acc, i * 16);
              boneInverses.push(m);
            }
          }
          skeletons.push(new THREE.Skeleton(bones, boneInverses));
        }

        // Setup scenes
        const scenes = this.json.scenes || [{ nodes: Object.keys(nodes).map(Number) }];
        for (const sceneDef of scenes) {
          const group = new THREE.Group();
          for (const ni of (sceneDef.nodes || [])) {
            group.add(nodes[ni]);
          }
          result.scenes.push(group);
        }
        result.scene = result.scenes[this.json.scene || 0] || result.scenes[0] || new THREE.Group();

        // Bind skins
        result.scene.traverse(node => {
          if (node.isSkinnedMesh && node.userData._skinIndex !== undefined) {
            const skeleton = skeletons[node.userData._skinIndex];
            if (skeleton) node.bind(skeleton);
          }
        });

        // Animations
        result.animations = this.buildAnimations(nodes);

        onLoad(result);
      } catch(e) {
        if (onError) onError(e); else console.error(e);
      }
    }

    getBuffer(index) {
      const bufferDef = this.json.buffers[index];
      if (bufferDef.uri) return null;
      return this.body;
    }

    getAccessorData(index) {
      const acc = this.json.accessors[index];
      const bv = this.json.bufferViews[acc.bufferView];
      const buffer = this.getBuffer(bv.buffer);
      const TypedArray = WEBGL_COMPONENT_TYPES[acc.componentType];
      const itemSize = WEBGL_TYPE_SIZES[acc.type];
      const byteOffset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
      const byteStride = bv.byteStride;
      if (byteStride && byteStride !== itemSize * TypedArray.BYTES_PER_ELEMENT) {
        const result = new TypedArray(acc.count * itemSize);
        const srcView = new DataView(buffer, byteOffset);
        for (let i = 0; i < acc.count; i++) {
          for (let j = 0; j < itemSize; j++) {
            const byteIdx = i * byteStride + j * TypedArray.BYTES_PER_ELEMENT;
            if (TypedArray === Float32Array) result[i * itemSize + j] = srcView.getFloat32(byteIdx, true);
            else if (TypedArray === Uint16Array) result[i * itemSize + j] = srcView.getUint16(byteIdx, true);
            else if (TypedArray === Uint32Array) result[i * itemSize + j] = srcView.getUint32(byteIdx, true);
            else result[i * itemSize + j] = srcView.getUint8(byteIdx);
          }
        }
        return result;
      }
      return new TypedArray(buffer, byteOffset, acc.count * itemSize);
    }

    buildMaterials() {
      this.materials = [];
      for (const matDef of (this.json.materials || [])) {
        const params = { side: THREE.DoubleSide };
        const pbr = matDef.pbrMetallicRoughness;
        if (pbr) {
          if (pbr.baseColorFactor) params.color = new THREE.Color().fromArray(pbr.baseColorFactor);
          params.metalness = pbr.metallicFactor !== undefined ? pbr.metallicFactor : 0.5;
          params.roughness = pbr.roughnessFactor !== undefined ? pbr.roughnessFactor : 0.5;
          if (pbr.baseColorTexture) {
            const tex = this.buildTexture(pbr.baseColorTexture.index);
            if (tex) params.map = tex;
          }
        }
        if (matDef.emissiveFactor) {
          params.emissive = new THREE.Color().fromArray(matDef.emissiveFactor);
        }
        if (matDef.alphaMode === 'BLEND') { params.transparent = true; params.opacity = 0.9; }
        this.materials.push(new THREE.MeshStandardMaterial(params));
      }
    }

    buildTexture(texIndex) {
      const texDef = this.json.textures[texIndex];
      if (!texDef) return null;
      const imgDef = this.json.images[texDef.source];
      if (!imgDef) return null;
      if (imgDef.bufferView !== undefined) {
        const bv = this.json.bufferViews[imgDef.bufferView];
        const buffer = this.getBuffer(bv.buffer);
        const data = new Uint8Array(buffer, bv.byteOffset || 0, bv.byteLength);
        const blob = new Blob([data], { type: imgDef.mimeType || 'image/png' });
        const url = URL.createObjectURL(blob);
        const tex = new THREE.TextureLoader().load(url);
        tex.flipY = false;
        tex.encoding = THREE.sRGBEncoding;
        return tex;
      }
      return null;
    }

    buildNodes() {
      const nodes = {};
      const defs = this.json.nodes || [];

      // First pass: create nodes
      for (let i = 0; i < defs.length; i++) {
        const def = defs[i];
        let node;
        if (def.mesh !== undefined) {
          node = this.buildMesh(def.mesh, def.skin);
          // If buildMesh returns a group, that's fine
        } else {
          node = new THREE.Bone();
        }
        if (def.name) node.name = def.name;
        if (def.translation) node.position.fromArray(def.translation);
        if (def.rotation) node.quaternion.fromArray(def.rotation);
        if (def.scale) node.scale.fromArray(def.scale);
        if (def.matrix) {
          const m = new THREE.Matrix4();
          m.fromArray(def.matrix);
          m.decompose(node.position, node.quaternion, node.scale);
        }
        nodes[i] = node;
      }

      // Second pass: parent
      for (let i = 0; i < defs.length; i++) {
        const def = defs[i];
        if (def.children) {
          for (const ci of def.children) {
            if (nodes[ci]) nodes[i].add(nodes[ci]);
          }
        }
      }
      return nodes;
    }

    buildMesh(meshIndex, skinIndex) {
      const meshDef = this.json.meshes[meshIndex];
      const group = new THREE.Group();
      for (const prim of meshDef.primitives) {
        const geom = new THREE.BufferGeometry();
        const attrs = prim.attributes;
        if (attrs.POSITION !== undefined) {
          const d = this.getAccessorData(attrs.POSITION);
          geom.setAttribute('position', new THREE.Float32BufferAttribute(d, 3));
        }
        if (attrs.NORMAL !== undefined) {
          const d = this.getAccessorData(attrs.NORMAL);
          geom.setAttribute('normal', new THREE.Float32BufferAttribute(d, 3));
        }
        if (attrs.TEXCOORD_0 !== undefined) {
          const d = this.getAccessorData(attrs.TEXCOORD_0);
          geom.setAttribute('uv', new THREE.Float32BufferAttribute(d, 2));
        }
        if (attrs.JOINTS_0 !== undefined) {
          const d = this.getAccessorData(attrs.JOINTS_0);
          geom.setAttribute('skinIndex', new THREE.Uint16BufferAttribute(d, 4));
        }
        if (attrs.WEIGHTS_0 !== undefined) {
          const d = this.getAccessorData(attrs.WEIGHTS_0);
          geom.setAttribute('skinWeight', new THREE.Float32BufferAttribute(d, 4));
        }
        if (prim.indices !== undefined) {
          const d = this.getAccessorData(prim.indices);
          geom.setIndex(new THREE.BufferAttribute(d, 1));
        }
        geom.computeBoundingSphere();
        const mat = prim.material !== undefined ? this.materials[prim.material] : new THREE.MeshStandardMaterial({ color: 0x888888, side: THREE.DoubleSide });

        let mesh;
        if (skinIndex !== undefined && geom.attributes.skinIndex && geom.attributes.skinWeight) {
          mesh = new THREE.SkinnedMesh(geom, mat);
          mesh.userData._skinIndex = skinIndex;
        } else {
          mesh = new THREE.Mesh(geom, mat);
        }
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
      }
      return group.children.length === 1 ? group.children[0] : group;
    }

    buildAnimations(nodes) {
      const animations = [];
      for (const animDef of (this.json.animations || [])) {
        const tracks = [];
        for (const channel of animDef.channels) {
          const sampler = animDef.samplers[channel.sampler];
          const target = channel.target;
          const node = nodes[target.node];
          if (!node) continue;
          const input = this.getAccessorData(sampler.input);
          const output = this.getAccessorData(sampler.output);
          const times = Array.from(input);
          const values = Array.from(output);
          const name = node.name || `node_${target.node}`;
          let trackType, propName;
          switch (target.path) {
            case 'translation': trackType = THREE.VectorKeyframeTrack; propName = '.position'; break;
            case 'rotation': trackType = THREE.QuaternionKeyframeTrack; propName = '.quaternion'; break;
            case 'scale': trackType = THREE.VectorKeyframeTrack; propName = '.scale'; break;
            default: continue;
          }
          tracks.push(new trackType(name + propName, times, values));
        }
        if (tracks.length) {
          const clip = new THREE.AnimationClip(animDef.name || `animation_${animations.length}`, undefined, tracks);
          animations.push(clip);
        }
      }
      return animations;
    }
  }

  THREE.GLTFLoader = GLTFLoader;
})();

function getTerrainHeight(x, z) {
  return Math.sin(x * 0.02) * Math.cos(z * 0.02) * 4 +
         Math.sin(x * 0.05 + 1) * Math.cos(z * 0.04 + 2) * 2 +
         Math.sin(x * 0.01) * Math.cos(z * 0.01) * 8;
}

const posArr = terrainGeo.attributes.position.array;
for (let i = 0; i < posArr.length; i += 3) {
  posArr[i + 1] = getTerrainHeight(posArr[i], posArr[i + 2]);
}
terrainGeo.computeVertexNormals();

// Vertex colors for terrain
const colors = new Float32Array(posArr.length);
for (let i = 0; i < posArr.length; i += 3) {
  const h = posArr[i + 1];
  if (h < -2) { colors[i] = 0.2; colors[i+1] = 0.35; colors[i+2] = 0.15; } // dark green
  else if (h < 2) { colors[i] = 0.35; colors[i+1] = 0.55; colors[i+2] = 0.2; } // grass
  else if (h < 6) { colors[i] = 0.45; colors[i+1] = 0.6; colors[i+2] = 0.25; } // light grass
  else { colors[i] = 0.55; colors[i+1] = 0.5; colors[i+2] = 0.35; } // rocky
}
terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

const terrainMat = new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.9, metalness: 0.0,
  side: THREE.DoubleSide
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);

function createTree(x, z) {

      new THREE.CylinderGeometry(3, 3.5, 1, 6),
      new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.8 })

const loader = new THREE.GLTFLoader();

function updateLoadBar(pct, text) {
  document.getElementById('load-bar').style.width = pct + '%';
  document.getElementById('load-text').textContent = text;
}

function parseGLB(data) {
  return new Promise((resolve, reject) => {
    loader.parse(data, '', resolve, reject);
  });
}

function loadArrayBuffer(url) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.responseType = 'arraybuffer';
    xhr.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 30);
        updateLoadBar(20 + pct, 'Downloading character...');
      }
    };
    xhr.onload = () => {
      if (xhr.status === 200 || xhr.status === 0) resolve(xhr.response);
      else reject(new Error('HTTP ' + xhr.status));
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send();
  });
}

(async function initModels() {
  try {
    updateLoadBar(15, 'Loading walking animation...');
    const walkData = await loadArrayBuffer('walking.glb');
    updateLoadBar(50, 'Parsing walk cycle...');
    const walkGltf = await parseGLB(walkData);

    updateLoadBar(60, 'Loading character model...');
    const idleData = await loadArrayBuffer('idle.glb');
    updateLoadBar(80, 'Parsing character mesh...');
    const idleGltf = await parseGLB(idleData);

    // Use the walking model as primary (has animation baked in)
    playerModel = walkGltf.scene;
    playerModel.scale.set(1.5, 1.5, 1.5);
    playerModel.traverse(c => {
      if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
    });

    // Setup walking animation mixer
    if (walkGltf.animations && walkGltf.animations.length > 0) {
      playerMixer = new THREE.AnimationMixer(playerModel);
      walkAction = playerMixer.clipAction(walkGltf.animations[0]);
      walkAction.play();
      walkAction.paused = true;
    }

    // Remove placeholder, add real model
    playerGroup.remove(placeholderBody);
    playerGroup.remove(placeholderHead);
    playerGroup.add(playerModel);

    console.log('Character loaded successfully! Animations:', walkGltf.animations.length);

    updateLoadBar(100, 'World ready. Click to enter...');
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('hud').style.display = '';
      document.getElementById('quest-panel').style.display = '';
    }, 800);
  } catch(err) {
    console.warn('GLB load error:', err);
    // Fallback: try loading from /mnt paths
    try {
      updateLoadBar(60, 'Trying alternate path...');
      const walkData2 = await loadArrayBuffer('/mnt/user-data/uploads/Meshy_AI_Conan_Edogawa_Tiny_D_biped_Animation_Walking_withSkin.glb');
      const walkGltf2 = await parseGLB(walkData2);
      playerModel = walkGltf2.scene;
      playerModel.scale.set(1.5, 1.5, 1.5);
      playerModel.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
      if (walkGltf2.animations && walkGltf2.animations.length > 0) {
        playerMixer = new THREE.AnimationMixer(playerModel);
        walkAction = playerMixer.clipAction(walkGltf2.animations[0]);
        walkAction.play();
        walkAction.paused = true;
      }
      playerGroup.remove(placeholderBody);
      playerGroup.remove(placeholderHead);
      playerGroup.add(playerModel);
      updateLoadBar(100, 'World ready!');
    } catch(err2) {
      console.warn('Fallback also failed, using placeholder:', err2);
      updateLoadBar(100, 'Using placeholder character — entering world...');
    }
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('hud').style.display = '';
      document.getElementById('quest-panel').style.display = '';
    }, 1000);
  }
})();

// ============================================================
// QUEST SYSTEM
// ============================================================
const quests = [];
let activeDialog = null;
let dialogIndex = 0;

function updateQuestPanel() {
  const list = document.getElementById('quest-list');
  list.innerHTML = '';
  for (const q of quests) {
    if (q.completed) continue;
    const div = document.createElement('div');
    div.className = 'quest-item';
    div.innerHTML = `
      <div class="quest-title">◆ ${q.title}</div>
      <div class="quest-desc">${q.desc}</div>
      <div class="quest-progress"><div class="quest-progress-fill" style="width:${(q.current/q.target)*100}%"></div></div>
    `;
    list.appendChild(div);
  }
}

function showNotification(text) {
  const n = document.getElementById('notification');
  n.textContent = text;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 2500);
}

function gainXP(amount) {
  player.xp += amount;
  while (player.xp >= player.xpToLevel) {
    player.xp -= player.xpToLevel;
    player.level++;
    player.maxHp += 15;
    player.hp = player.maxHp;
    player.maxSp += 10;
    player.sp = player.maxSp;
    player.atk += 3;
    player.def += 2;
    player.xpToLevel = Math.floor(player.xpToLevel * 1.5);
    showNotification(`⚔ LEVEL UP! Level ${player.level} ⚔`);
  }
}

function showDamageNumber(x, y, value, isHeal) {
  const div = document.createElement('div');
  div.className = 'dmg-number' + (isHeal ? ' heal' : '');
  div.textContent = (isHeal ? '+' : '-') + value;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', e => {
  keys[e.code] = true;

  if (e.code === 'KeyE') {
    // Dialog
    if (activeDialog) {
      dialogIndex++;
      if (dialogIndex >= activeDialog.dialog.length) {
        document.getElementById('dialog-box').classList.remove('show');
        // Accept quest
        if (activeDialog.quest && !quests.find(q => q.id === activeDialog.quest.id)) {
          const q = { ...activeDialog.quest, completed: false };
          quests.push(q);
          showNotification(`New Quest: ${q.title}`);
          updateQuestPanel();
        }
        activeDialog = null;
        return;
      }
      document.getElementById('dialog-text').textContent = activeDialog.dialog[dialogIndex];
      return;
    }

    // Check NPC interaction
    for (const npc of npcs) {
      const dist = playerGroup.position.distanceTo(npc.position);
      if (dist < npc.userData.interactRadius) {
        activeDialog = npc.userData;
        dialogIndex = 0;
        document.getElementById('dialog-speaker').textContent = npc.userData.name;
        document.getElementById('dialog-text').textContent = npc.userData.dialog[0];
        document.getElementById('dialog-box').classList.add('show');
        break;
      }
    }

    // Check crystal collection
    for (const c of crystals) {
      if (c.userData.collected) continue;
      const dist = playerGroup.position.distanceTo(c.position);
      if (dist < c.userData.interactRadius) {
        c.userData.collected = true;
        scene.remove(c);
        showNotification('✦ Crystal Shard collected!');
        // Update quest
        const q = quests.find(q => q.id === 'crystals' && !q.completed);
        if (q) {
          q.current++;
          if (q.current >= q.target) {
            q.completed = true;
            gainXP(q.reward.xp);
            player.gold += q.reward.gold;
            showNotification(`Quest Complete: ${q.title}! +${q.reward.xp}XP +${q.reward.gold}G`);
          }
          updateQuestPanel();
        }
        break;
      }
    }
  }
});

document.addEventListener('keyup', e => { keys[e.code] = false; });

// Mouse look
renderer.domElement.addEventListener('click', () => {
  if (!isPointerLocked) renderer.domElement.requestPointerLock();
  else playerAttack();
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', e => {
  if (!isPointerLocked) return;
  cameraAngleH -= e.movementX * 0.003;
  cameraAngleV = Math.max(0.1, Math.min(1.2, cameraAngleV + e.movementY * 0.003));
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// COMBAT
// ============================================================
function playerAttack() {
  if (player.attackCooldown > 0 || player.sp < 5) return;
  player.isAttacking = true;
  player.attackCooldown = 0.5;
  player.sp = Math.max(0, player.sp - 5);

  // Flash sword trail
  swordTrail.material.opacity = 1;

  // Check enemies in range
  const attackDir = new THREE.Vector3(
    -Math.sin(cameraAngleH), 0, -Math.cos(cameraAngleH)
  ).normalize();

  for (const enemy of enemies) {
    if (enemy.userData.dead) continue;
    const toEnemy = new THREE.Vector3().subVectors(enemy.position, playerGroup.position);
    const dist = toEnemy.length();
    toEnemy.normalize();
    const dot = attackDir.dot(toEnemy);

    if (dist < 4 && dot > 0.3) {
      const dmg = Math.max(1, player.atk - Math.floor(Math.random() * 5));
      enemy.userData.hp -= dmg;
      enemy.userData.hitFlash = 0.2;

      // Screen position for damage number
      const screenPos = enemy.position.clone();
      screenPos.y += 3;
      screenPos.project(camera);
      const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
      showDamageNumber(sx, sy, dmg, false);

      if (enemy.userData.hp <= 0) {
        enemy.userData.dead = true;
        gainXP(enemy.userData.xpReward);

        // Quest progress
        for (const q of quests) {
          if (!q.completed && q.type === 'kill' && q.enemyType === enemy.userData.enemyType) {
            q.current++;
            if (q.current >= q.target) {
              q.completed = true;
              gainXP(q.reward.xp);
              player.gold += q.reward.gold;
              showNotification(`Quest Complete: ${q.title}! +${q.reward.xp}XP +${q.reward.gold}G`);
            }
            updateQuestPanel();
          }
        }

        // Death animation - shrink and remove
        enemy.userData.deathTimer = 1;
      }
    }
  }
}

// ============================================================
// MINIMAP
// ============================================================
const minimapCtx = document.getElementById('minimap-canvas').getContext('2d');

function updateMinimap() {
  const ctx = minimapCtx;
  const w = 160, h = 160;
  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.beginPath();
  ctx.arc(w/2, h/2, w/2, 0, Math.PI * 2);
  ctx.fill();

  const scale = 0.35;
  const px = playerGroup.position.x;
  const pz = playerGroup.position.z;

  // Terrain hint
  ctx.fillStyle = 'rgba(40,80,40,0.3)';
  ctx.beginPath();
  ctx.arc(w/2, h/2, 70, 0, Math.PI * 2);
  ctx.fill();

  // Buildings
  for (const b of buildings) {
    const dx = (b.position.x - px) * scale + w/2;
    const dz = (b.position.z - pz) * scale + h/2;
    if (dx > 10 && dx < w-10 && dz > 10 && dz < h-10) {
      ctx.fillStyle = b.userData.type === 'house' ? '#d4a574' : b.userData.type === 'tower' ? '#8888cc' : '#44bbff';
      ctx.fillRect(dx-3, dz-3, 6, 6);
    }
  }

  // NPCs
  for (const npc of npcs) {
    const dx = (npc.position.x - px) * scale + w/2;
    const dz = (npc.position.z - pz) * scale + h/2;
    if (dx > 5 && dx < w-5 && dz > 5 && dz < h-5) {
      ctx.fillStyle = '#f4d03f';
      ctx.beginPath();
      ctx.arc(dx, dz, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Enemies
  for (const e of enemies) {
    if (e.userData.dead) continue;
    const dx = (e.position.x - px) * scale + w/2;
    const dz = (e.position.z - pz) * scale + h/2;
    if (dx > 5 && dx < w-5 && dz > 5 && dz < h-5) {
      ctx.fillStyle = '#e63946';
      ctx.beginPath();
      ctx.arc(dx, dz, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Crystals
  for (const c of crystals) {
    if (c.userData.collected) continue;
    const dx = (c.position.x - px) * scale + w/2;
    const dz = (c.position.z - pz) * scale + h/2;
    if (dx > 5 && dx < w-5 && dz > 5 && dz < h-5) {
      ctx.fillStyle = '#44ddff';
      ctx.beginPath();
      ctx.arc(dx, dz, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Direction indicator
  ctx.save();
  ctx.translate(w/2, h/2);
  ctx.rotate(-cameraAngleH);
  ctx.fillStyle = '#f4d03f';
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.lineTo(-4, 4);
  ctx.lineTo(4, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
const clock = new THREE.Clock();
let isMoving = false;

function update(dt) {
  // Movement
  const moveDir = new THREE.Vector3(0, 0, 0);
  isMoving = false;

  if (keys['KeyW'] || keys['ArrowUp']) { moveDir.z -= 1; isMoving = true; }
  if (keys['KeyS'] || keys['ArrowDown']) { moveDir.z += 1; isMoving = true; }
  if (keys['KeyA'] || keys['ArrowLeft']) { moveDir.x -= 1; isMoving = true; }
  if (keys['KeyD'] || keys['ArrowRight']) { moveDir.x += 1; isMoving = true; }

  if (moveDir.length() > 0) {
    moveDir.normalize();
    // Rotate move direction by camera angle
    const angle = cameraAngleH;
    const rx = moveDir.x * Math.cos(angle) - moveDir.z * Math.sin(angle);
    const rz = moveDir.x * Math.sin(angle) + moveDir.z * Math.cos(angle);
    moveDir.x = rx;
    moveDir.z = rz;

    const isSprinting = keys['ShiftLeft'] || keys['ShiftRight'];
    let speed = player.speed;
    if (isSprinting && player.sp > 0) {
      speed *= player.sprintMult;
      player.sp = Math.max(0, player.sp - 20 * dt);
    }

    playerGroup.position.x += moveDir.x * speed * dt;
    playerGroup.position.z += moveDir.z * speed * dt;

    // Rotate player to face move direction
    const targetAngle = Math.atan2(moveDir.x, moveDir.z);
    if (playerModel) {
      playerModel.rotation.y = targetAngle;
    } else {
      placeholderBody.rotation.y = targetAngle;
    }
  }

  // Stamina regen
  if (!keys['ShiftLeft'] && !keys['ShiftRight']) {
    player.sp = Math.min(player.maxSp, player.sp + 15 * dt);
  }

  // HP regen (slow)
  player.hp = Math.min(player.maxHp, player.hp + 0.5 * dt);

  // Jump
  if (keys['Space'] && player.isGrounded) {
    player.velY = 10;
    player.isGrounded = false;
  }

  // Gravity
  player.velY -= 25 * dt;
  playerGroup.position.y += player.velY * dt;

  const groundY = getTerrainHeight(playerGroup.position.x, playerGroup.position.z);
  if (playerGroup.position.y <= groundY) {
    playerGroup.position.y = groundY;
    player.velY = 0;
    player.isGrounded = true;
  }

  // Clamp to world
  playerGroup.position.x = Math.max(-HALF + 5, Math.min(HALF - 5, playerGroup.position.x));
  playerGroup.position.z = Math.max(-HALF + 5, Math.min(HALF - 5, playerGroup.position.z));

  // Animation
  if (walkAction) {
    if (isMoving) {
      walkAction.paused = false;
      const isSprinting = keys['ShiftLeft'] || keys['ShiftRight'];
      walkAction.timeScale = isSprinting ? 2 : 1;
    } else {
      walkAction.paused = true;
    }
  }
  if (playerMixer) playerMixer.update(dt);

  // Attack cooldown / sword trail
  if (player.attackCooldown > 0) {
    player.attackCooldown -= dt;
    swordTrail.material.opacity *= 0.85;
    swordTrail.rotation.y += dt * 15;
  } else {
    swordTrail.material.opacity = 0;
    player.isAttacking = false;
  }

  // Camera
  const camX = playerGroup.position.x + Math.sin(cameraAngleH) * cameraDist * Math.cos(cameraAngleV);
  const camY = playerGroup.position.y + 2 + cameraDist * Math.sin(cameraAngleV);
  const camZ = playerGroup.position.z + Math.cos(cameraAngleH) * cameraDist * Math.cos(cameraAngleV);
  camera.position.set(camX, camY, camZ);
  camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.5, playerGroup.position.z);

  // Sun follows player loosely
  sunLight.position.set(playerGroup.position.x + 80, 120, playerGroup.position.z + 60);
  sunLight.target.position.copy(playerGroup.position);
  sunLight.target.updateMatrixWorld();

  // ============================================================
  // ENEMY AI
  // ============================================================
  for (const enemy of enemies) {
    if (enemy.userData.dead) {
      if (enemy.userData.deathTimer !== undefined) {
        enemy.userData.deathTimer -= dt;
        enemy.scale.multiplyScalar(0.95);
        enemy.position.y -= dt * 2;
        if (enemy.userData.deathTimer <= 0) {
          scene.remove(enemy);
          enemy.userData.deathTimer = undefined;
        }
      }
      continue;
    }

    const toPlayer = new THREE.Vector3().subVectors(playerGroup.position, enemy.position);
    const dist = toPlayer.length();
    toPlayer.y = 0;

    // Hit flash
    if (enemy.userData.hitFlash > 0) {
      enemy.userData.hitFlash -= dt;
      enemy.traverse(c => {
        if (c.isMesh && c.material) {
          c.material.emissive = c.material.emissive || new THREE.Color();
          c.material.emissive.setHex(enemy.userData.hitFlash > 0 ? 0xff4444 : 0x000000);
          c.material.emissiveIntensity = enemy.userData.hitFlash > 0 ? 1 : 0;
        }
      });
    }

    // Aggro
    if (dist < enemy.userData.aggroRange) {
      toPlayer.normalize();
      if (dist > enemy.userData.attackRange) {
        enemy.position.x += toPlayer.x * enemy.userData.speed * dt;
        enemy.position.z += toPlayer.z * enemy.userData.speed * dt;
        enemy.position.y = getTerrainHeight(enemy.position.x, enemy.position.z);
        // Face player
        const angle = Math.atan2(toPlayer.x, toPlayer.z);
        enemy.rotation.y = angle;
      } else {
        // Attack player
        enemy.userData.attackCooldown -= dt;
        if (enemy.userData.attackCooldown <= 0) {
          const dmg = Math.max(1, enemy.userData.atk - player.def + Math.floor(Math.random() * 3));
          player.hp -= dmg;
          enemy.userData.attackCooldown = 1.5;

          const screenPos = playerGroup.position.clone();
          screenPos.y += 2.5;
          screenPos.project(camera);
          const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
          const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
          showDamageNumber(sx, sy, dmg, false);

          if (player.hp <= 0) {
            player.hp = player.maxHp;
            player.sp = player.maxSp;
            playerGroup.position.set(0, getTerrainHeight(0, 0), 0);
            showNotification('You have fallen... Respawning at camp.');
          }
        }
      }
    } else {
      // Idle patrol - wander near origin
      const ox = enemy.userData.originX;
      const oz = enemy.userData.originZ;
      const wanderDist = new THREE.Vector2(enemy.position.x - ox, enemy.position.z - oz).length();
      if (wanderDist > 15) {
        const toOrigin = new THREE.Vector3(ox - enemy.position.x, 0, oz - enemy.position.z).normalize();
        enemy.position.x += toOrigin.x * enemy.userData.speed * 0.3 * dt;
        enemy.position.z += toOrigin.z * enemy.userData.speed * 0.3 * dt;
        enemy.position.y = getTerrainHeight(enemy.position.x, enemy.position.z);
      }
    }

    // Slime bounce
    if (enemy.userData.enemyType === 'slime' && !enemy.userData.dead) {
      const bounce = Math.abs(Math.sin(Date.now() * 0.005)) * 0.3;
      enemy.children[0].position.y = 0.7 + bounce;
      enemy.children[0].scale.y = 1 - bounce * 0.3;
      enemy.children[0].scale.x = 1 + bounce * 0.15;
      enemy.children[0].scale.z = 1 + bounce * 0.15;
    }
  }

  // Interact prompt
  let nearInteractable = false;
  for (const npc of npcs) {
    if (playerGroup.position.distanceTo(npc.position) < npc.userData.interactRadius) {
      nearInteractable = true;
      break;
    }
  }
  if (!nearInteractable) {
    for (const c of crystals) {
      if (!c.userData.collected && playerGroup.position.distanceTo(c.position) < c.userData.interactRadius) {
        nearInteractable = true;
        break;
      }
    }
  }
  document.getElementById('interact-prompt').style.display = (nearInteractable && !activeDialog) ? 'block' : 'none';

  // Crystal rotation
  for (const c of crystals) {
    if (!c.userData.collected) {
      c.children[0].rotation.y += dt * 2;
      c.children[0].position.y = 1.5 + Math.sin(Date.now() * 0.003) * 0.3;
    }
  }

  // NPC idle animation (subtle bob)
  for (const npc of npcs) {
    npc.children[2].position.y = 2.8 + Math.sin(Date.now() * 0.004) * 0.15;
  }

  // Update HUD
  document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
  document.getElementById('sp-bar').style.width = (player.sp / player.maxSp * 100) + '%';
  document.getElementById('xp-bar').style.width = (player.xp / player.xpToLevel * 100) + '%';
  document.getElementById('hp-text').textContent = `${Math.ceil(player.hp)}/${player.maxHp}`;
  document.getElementById('sp-text').textContent = `${Math.ceil(player.sp)}/${player.maxSp}`;
  document.getElementById('xp-text').textContent = `${player.xp}/${player.xpToLevel}`;
  document.getElementById('level-num').textContent = player.level;

  // Water animation
  water.material.opacity = 0.5 + Math.sin(Date.now() * 0.001) * 0.1;

  updateMinimap();
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

animate();
</script>
